<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <div th:replace="~{header :: imports}"></div>
    <title>Post an Event</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .form-container {
            margin-bottom: 50px; /* Adjust the margin as needed */
        }
    </style>
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div th:replace="~{navigation :: navigation}"></div>
<div class="container mt-5 form-container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Post an Event</h2>
            <form action="/post-event" method="post">
                <div class="form-group">
                    <label for="title">Title of the Post</label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="date">Date of Help Needed</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="helpType">Type of Help Needed</label>
                    <select class="form-control" id="helpType" name="helpType" required>
                        <option value="money">Money</option>
                        <option value="blood">Blood</option>
                        <option value="others">Others</option>
                    </select>
                </div>
                <div class="form-group" id="descriptionBox" style="display: none;">
                    <label for="description">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="location">Location of Help Needed</label>
                    <input type="text" class="form-control" id="location" name="location" required>
                </div>
                <div class="form-group">
                    <label for="details">Details of Help Needed</label>
                    <textarea class="form-control" id="details" name="details" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="directions">Directions to Reach Destination</label>
                    <textarea class="form-control" id="directions" name="directions" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Post Event</button>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{footer :: footer}"></div>
<script>
    // Show description box if "Others" is selected as help type
    document.getElementById('helpType').addEventListener('change', function() {
        var descriptionBox = document.getElementById('descriptionBox');
        if (this.value === 'others') {
            descriptionBox.style.display = 'block';
        } else {
            descriptionBox.style.display = 'none';
        }
    });
</script>
</body>
</html>
