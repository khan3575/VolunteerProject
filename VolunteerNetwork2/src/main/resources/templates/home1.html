<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Volunteer Network</title>
    <div th:replace="~{header :: imports}"></div>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Custom Styles */
        .events-feed-container {
            max-height: 500px; /* Adjust height as needed */
            overflow-y: auto;
            margin-top: 20px;
        }
        .event-item {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div th:replace="~{navigation :: navigation}"></div>

<div class="container">
    <h1 class="mt-4">Latest Events</h1>
    <div class="events-feed-container">
        <div class="card event-item" th:each="event : ${eventList}">
            <div class="card-body">
                <h5 class="card-title" th:text="${event.title}">Event Title</h5>
                <p class="card-text" th:text="${event.content}">Event content goes here...</p>
                <a th:href="@{/events/${event.id}}" class="btn btn-primary">Read More</a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
